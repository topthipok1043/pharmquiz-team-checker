<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบตรวจสอบรายชื่อ PharmQuizKKU2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Taviraj:wght@500;600;700&family=Sarabun:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0a1a13;
    --panel:#0f2a1f;
    --panel-2:#153a2b;
    --line:#2f5f46;
    --text:#eef6f1;
    --text-dim:#9fc2ac;
    --accent:#3fae74;
    --accent-strong:#1a472a;
    --silver:#c7d1cf;
    --ok:#52c97e;
    --pending:#d4a24c;
    --rejected:#e2707a;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    min-height:100vh;
    background:
      radial-gradient(circle at 12% 0%, rgba(63,174,116,0.16), transparent 45%),
      radial-gradient(circle at 88% 12%, rgba(199,209,207,0.06), transparent 40%),
      var(--ink);
    color:var(--text);
    font-family:'Sarabun', sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:48px 20px 80px;
  }
  .site-logo{
    max-width:120px;
    height:auto;
    margin-bottom:18px;
    filter:drop-shadow(0 6px 18px rgba(63,174,116,0.35));
  }

  .hygieia-watermark{
    position:fixed;
    pointer-events:none;
    color:#000;
    z-index:-1;
  }
  .hygieia-watermark.tl{
    top:-30px; left:-30px;
    width:190px; height:auto;
    opacity:0.09;
    animation:float-drift 9s ease-in-out infinite;
  }
  .hygieia-watermark.br{
    bottom:-25px; right:-25px;
    width:150px; height:auto;
    opacity:0.08;
    animation:float-drift 11s ease-in-out infinite reverse;
  }
  .hygieia-inline{
    width:34px;
    height:auto;
    color:#0a1a13;
    opacity:0.85;
    vertical-align:middle;
    animation:float-drift 5s ease-in-out infinite;
  }
  .snake-head-dot{ animation:tongue-flick 2.4s ease-in-out infinite; }
  .bubble{ animation:bubble-rise 2.6s ease-in-out infinite; transform-origin:center; }
  .bubble:nth-child(3){ animation-delay:0.6s; }

  @keyframes float-drift{
    0%,100%{ transform:translateY(0) rotate(-3deg); }
    50%{ transform:translateY(-14px) rotate(3deg); }
  }
  @keyframes tongue-flick{
    0%,80%,100%{ opacity:1; }
    88%{ opacity:0.3; }
  }
  @keyframes bubble-rise{
    0%{ transform:translateY(0); opacity:0.8; }
    100%{ transform:translateY(-6px); opacity:0; }
  }

  .eyebrow{
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    letter-spacing:0.18em;
    color:var(--silver);
    text-transform:uppercase;
    margin-bottom:10px;
    display:flex;
    align-items:center;
    gap:7px;
  }
  .eyebrow .snake{
    display:inline-block;
    animation:slither 3.2s ease-in-out infinite;
  }
  h1{
    font-family:'Taviraj', serif;
    font-size:clamp(24px,4vw,34px);
    font-weight:600;
    margin:0 0 10px;
    text-align:center;
  }
  .underline{
    width:120px;
    height:3px;
    border-radius:3px;
    margin-bottom:24px;
    background:linear-gradient(90deg, transparent, var(--accent), var(--silver), var(--accent), transparent);
    background-size:200% 100%;
    animation:shimmer-move 3.5s linear infinite;
  }
  .sub{
    color:var(--text-dim);
    font-size:14.5px;
    margin-bottom:34px;
    text-align:center;
    max-width:520px;
  }
  .search-card{
    width:100%;
    max-width:560px;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:10px;
    display:flex;
    gap:8px;
    box-shadow:0 20px 60px -20px rgba(0,0,0,0.7);
    transition:border-color .25s ease, box-shadow .25s ease;
  }
  .search-card:focus-within{
    border-color:var(--accent);
    box-shadow:0 20px 60px -20px rgba(0,0,0,0.7), 0 0 0 3px rgba(63,174,116,0.18);
  }
  .search-card input{
    flex:1;
    background:transparent;
    border:none;
    outline:none;
    color:var(--text);
    font-family:'Sarabun', sans-serif;
    font-size:16px;
    padding:12px 14px;
  }
  .search-card input::placeholder{color:var(--text-dim);}
  .search-card button{
    background:var(--accent);
    color:#06170f;
    border:none;
    border-radius:9px;
    padding:0 22px;
    font-family:'Sarabun', sans-serif;
    font-weight:700;
    font-size:15px;
    cursor:pointer;
    transition:transform .15s ease, opacity .15s ease, box-shadow .2s ease;
  }
  .search-card button:hover{opacity:.92;box-shadow:0 0 18px rgba(63,174,116,0.55);}
  .search-card button:active{transform:scale(0.97);}

  .meta-row{
    width:100%;
    max-width:560px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:12px;
    font-size:12.5px;
    color:var(--text-dim);
    font-family:'JetBrains Mono', monospace;
  }
  .dot{
    display:inline-block;
    width:7px;height:7px;border-radius:50%;
    background:var(--ok);
    margin-right:6px;
    animation:pulse-ring 2s ease-in-out infinite;
  }
  .dot.off{background:var(--text-dim);box-shadow:none;animation:none;}

  #diagPanel{
    width:100%;
    max-width:560px;
  }
  .diag-box{
    margin-top:14px;
    background:rgba(226,112,122,0.08);
    border:1px solid rgba(226,112,122,0.35);
    border-radius:10px;
    padding:14px 16px;
    font-size:13px;
    line-height:1.7;
  }
  .diag-title{
    font-weight:700;
    color:var(--rejected);
    margin-bottom:6px;
  }
  .diag-list{
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    background:rgba(0,0,0,0.25);
    border-radius:6px;
    padding:8px 10px;
    margin:6px 0;
    max-height:160px;
    overflow-y:auto;
    white-space:pre-wrap;
    word-break:break-word;
  }

  #resultArea{
    width:100%;
    max-width:560px;
    margin-top:28px;
  }

  .state-msg{
    text-align:center;
    color:var(--text-dim);
    font-size:14px;
    padding:30px 10px;
  }

  .badge-card{
    background:
      repeating-radial-gradient(circle at 0 0, rgba(199,209,207,0.03) 0, rgba(199,209,207,0.03) 1px, transparent 1px, transparent 14px),
      linear-gradient(155deg, var(--panel-2), var(--panel));
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:22px 22px 18px;
    margin-bottom:18px;
    position:relative;
    overflow:hidden;
    opacity:0;
    transform:translateY(14px);
    animation:fadeInUp .5s ease forwards;
    transition:transform .25s ease, box-shadow .25s ease, border-color .25s ease;
  }
  .badge-card:hover{
    transform:translateY(-3px);
    border-color:var(--accent);
    box-shadow:0 16px 40px -18px rgba(63,174,116,0.45);
  }
  .badge-card::before{
    content:"";
    position:absolute;
    top:-40%;right:-20%;
    width:220px;height:220px;
    background:radial-gradient(circle, rgba(63,174,116,0.20), transparent 70%);
    pointer-events:none;
  }
  .badge-top{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    margin-bottom:16px;
  }
  .team-label{
    font-family:'JetBrains Mono', monospace;
    font-size:11.5px;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--text-dim);
    margin-bottom:4px;
  }
  .team-name{
    font-family:'Taviraj', serif;
    font-size:21px;
    font-weight:600;
  }
  .team-email{
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    color:var(--text-dim);
    margin-top:4px;
  }
  .team-school{
    font-size:13px;
    color:var(--text-dim);
    margin-top:6px;
    display:flex;
    align-items:center;
    gap:5px;
}
  .team-note{
    font-size:13px;
    color:var(--text-dim);
    margin-top:6px;
    padding-top:8px;
    border-top:1px dashed var(--line);
    line-height:1.5;
}
  .ticket-divider{
    position:relative;
    height:0;
    border-top:2px dashed var(--line);
    margin:16px 0 4px;
  }
  .ticket-divider::before,
  .ticket-divider::after{
    content:"";
    position:absolute;
    top:50%;
    width:20px;height:20px;
    background:var(--ink);
    border-radius:50%;
    transform:translateY(-50%);
  }
  .ticket-divider::before{ left:-32px; }
  .ticket-divider::after{ right:-32px; }
  .team-code{
    font-family:'JetBrains Mono', monospace;
    font-size:15px;
    font-weight:700;
    background:linear-gradient(100deg,
      rgba(63,174,116,0.16) 0%,
      rgba(199,209,207,0.28) 45%,
      rgba(63,174,116,0.16) 100%);
    background-size:220% 100%;
    animation:shimmer-move 4.5s linear infinite;
    color:var(--silver);
    border:1px solid rgba(199,209,207,0.35);
    padding:6px 12px;
    border-radius:8px;
    white-space:nowrap;
  }
  .badge-top-right{
    display:flex;
    flex-direction:column;
    align-items:flex-end;
    gap:8px;
  }

  .members-label{
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--text-dim);
    margin:14px 0 2px;
  }
  .member{
    display:flex;
    align-items:center;
    padding:9px 0;
    border-top:1px solid var(--line);
    gap:10px;
  }
  .member-index{
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    font-weight:700;
    color:var(--text-dim);
    background:rgba(255,255,255,0.05);
    border:1px solid var(--line);
    width:22px;height:22px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-shrink:0;
  }
  .member-name{
    font-size:15px;
  }
  .member-name.self{color:var(--accent);font-weight:600;}
  .member-detail{
    font-size:12px;
    color:var(--text-dim);
    margin-top:1px;
  }
  .status-pill{
    font-family:'JetBrains Mono', monospace;
    font-size:11.5px;
    font-weight:700;
    padding:5px 10px;
    border-radius:100px;
    white-space:nowrap;
    flex-shrink:0;
  }
  .status-approved{background:rgba(82,201,126,0.14);color:var(--ok);border:1px solid rgba(82,201,126,0.4);}
  .status-pending{background:rgba(212,162,76,0.14);color:var(--pending);border:1px solid rgba(212,162,76,0.4);}
  .status-rejected{background:rgba(226,112,122,0.14);color:var(--rejected);border:1px solid rgba(226,112,122,0.4);}
  .status-unknown{background:rgba(159,194,172,0.14);color:var(--text-dim);border:1px solid var(--line);}

  .footer-note{
    margin-top:40px;
    font-size:12px;
    color:var(--text-dim);
    text-align:center;
    max-width:480px;
    line-height:1.6;
  }
  code{
    font-family:'JetBrains Mono', monospace;
    background:rgba(255,255,255,0.06);
    padding:1px 5px;
    border-radius:4px;
  }

  @keyframes fadeInUp{
    to{ opacity:1; transform:translateY(0); }
  }
  @keyframes shimmer-move{
    0%{ background-position:200% 0; }
    100%{ background-position:-200% 0; }
  }
  @keyframes pulse-ring{
    0%,100%{ box-shadow:0 0 0 0 rgba(82,201,126,0.4); }
    50%{ box-shadow:0 0 0 5px rgba(82,201,126,0); }
  }
  @keyframes slither{
    0%,100%{ transform:translateX(0) rotate(0deg); }
    25%{ transform:translateX(2px) rotate(-8deg); }
    75%{ transform:translateX(-2px) rotate(8deg); }
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation:none !important; transition:none !important; }
  }
</style>
</head>
<body>

  <!-- shared gradients ใช้ร่วมกันทุกจุดที่วาดงู/ถ้วยยา -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <defs>
      <linearGradient id="snakeGrad" x1="0%" y1="0%" x2="100%" y2="100%">

  <svg class="hygieia-watermark tl" viewBox="0 0 100 140" xmlns="http://www.w3.org/2000/svg">

  <img src="logo.png" alt="PharmQuiz KKU 2026 logo" class="site-logo" onerror="this.style.display='none'">
  <div class="eyebrow">
    <svg class="hygieia-inline" viewBox="0 0 100 140" xmlns="http://www.w3.org/2000/svg">
      <path d="M30 90 L70 90 L60 130 L40 130 Z" fill="url(#cupGrad)" stroke="#000" stroke-width="1.5" stroke-linejoin="round"/>
      <ellipse cx="50" cy="90" rx="20" ry="6" fill="url(#liquidGrad)" stroke="#000" stroke-width="1.5"/>

  </div>
  <h1>ระบบตรวจสอบรายชื่อทีม</h1>
  <div class="underline"></div>
  <div class="sub">พิมพ์ชื่อ-นามสกุล หรือชื่อทีม เพื่อดูรหัสทีม รายชื่อสมาชิก และสถานะการสมัคร</div>

  <div class="search-card">
    <input id="searchInput" type="text" placeholder="เช่น สมชาย ใจดี หรือ ชื่อทีม" autocomplete="off">
    <button id="searchBtn">ค้นหา</button>
  </div>

  <div class="meta-row" style="display:none">
    <span><span class="dot" id="liveDot"></span><span id="liveText">กำลังเชื่อมต่อชีต...</span></span>
    <span id="lastUpdated"></span>
  </div>

  <div id="diagPanel"></div>

  <div id="resultArea">
    <div class="state-msg">ผลการค้นหาจะแสดงที่นี่</div>
  </div>

  <div class="footer-note">

<script>
/* ============================================================
   CONFIG — ตั้งค่าตามหัวคอลัมน์จริงของฟอร์ม PharmQuiz KKU 2026
   ============================================================
   1) เปิด Google Sheet -> Share -> เปลี่ยนเป็น "Anyone with the link" = Viewer
   2) คัดลอก Sheet ID จาก URL:
      https://docs.google.com/spreadsheets/d/[SHEET_ID]/edit
   3) SHEET_NAME: ชีตที่เชื่อมกับฟอร์มมักชื่อ "Form Responses 1"
      หรือถ้าเป็นภาษาไทยจะชื่อ "การตอบแบบฟอร์ม 1" — เปิดชีตแล้วดูชื่อแท็บ
      ด้านล่างให้ตรงเป๊ะ (รวมช่องว่าง/ตัวเลขด้วย)
   4) ชื่อคอลัมน์ด้านล่างต้อง "ตรงเป๊ะ" กับหัวตารางในชีตของคุณ
      หมายเหตุ: ชีตนี้มีคอลัมน์ "ชั้นปี" ซ้ำกัน 3 ครั้ง (คนละสมาชิก)
      ระบบจะเติมหมายเลขกำกับให้อัตโนมัติเป็น "ชั้นปี (1)", "ชั้นปี (2)", "ชั้นปี (3)"
      ตามลำดับซ้าย->ขวาที่เจอในชีต ให้ใช้ชื่อที่มีหมายเลขกำกับใน MEMBERS ด้านล่าง
   ============================================================ */
const CONFIG = {
  SHEET_ID: "122oZrSj-_isO6nLjmoZfEKQkx-MxLVhN-LyxHz4jlZ0",
  SHEET_NAME: "Form Responses 1",
  COLUMNS: {
    teamName: "ชื่อทีม (ไม่เกิน 50 ตัวอักษร)",
    teamCode: "รหัสทีม",
    status: "สถานะการสมัคร",
    email: "Email Address",
    school: "โรงเรียนที่กำลังศึกษาอยู่" 
    note: "หมายเหตุ" 
  },
  // สมาชิกแต่ละคน: name = คอลัมน์ชื่อ-สกุล, year = คอลัมน์ชั้นปีของคนนั้น (ใส่ null ถ้าไม่มี)
  // เพิ่ม/ลบรายการในนี้ได้ตามจำนวนสมาชิกสูงสุดที่ฟอร์มรับจริง
  MEMBERS: [
    { name: "ชื่อ-สกุล สมาชิกทีมคนที่ 1 (หัวหน้าทีม)", year: "ชั้นปี (1)", role: "หัวหน้าทีม" },
    { name: "ชื่อ-สกุล สมาชิกทีมคนที่ 2", year: "ชั้นปี (2)", role: null },
    { name: "ชื่อ-สกุล สมาชิกทีมคนที่ 3", year: "ชั้นปี (3)", role: null }
  ],
  REFRESH_MS: 30000
};
/* ============================================================ */

let allRows = [];
let lastQuery = "";

const liveDot = document.getElementById('liveDot');
const liveText = document.getElementById('liveText');
const lastUpdated = document.getElementById('lastUpdated');
const resultArea = document.getElementById('resultArea');
const searchInput = document.getElementById('searchInput');
const searchBtn = document.getElementById('searchBtn');

function gvizUrl(){
  return `https://docs.google.com/spreadsheets/d/${CONFIG.SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(CONFIG.SHEET_NAME)}`;
}

async function fetchSheet(){
  try{
    const res = await fetch(gvizUrl(), {cache:"no-store"});
    const text = await res.text();
    const jsonStr = text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1);
    const data = JSON.parse(jsonStr);

    const rawHeaders = data.table.cols.map(c => (c.label || "").trim());

    // ชีตนี้มีหัวคอลัมน์ซ้ำกัน (เช่น "ชั้นปี" x3) -> เติมหมายเลขกำกับ
    // ตามลำดับที่เจอ ให้กลายเป็น "ชั้นปี (1)", "ชั้นปี (2)", ... เพื่อให้อ้างอิงแยกกันได้
    const headerCounts = {};
    rawHeaders.forEach(h => { headerCounts[h] = (headerCounts[h] || 0) + 1; });
    const seenSoFar = {};
    const headers = rawHeaders.map(h => {
      if(headerCounts[h] > 1){
        seenSoFar[h] = (seenSoFar[h] || 0) + 1;
        return `${h} (${seenSoFar[h]})`;
      }
      return h;
    });

    const rows = data.table.rows.map(r => {
      const obj = {};
      headers.forEach((h, i) => {
        obj[h] = r.c[i] && r.c[i].v !== null ? String(r.c[i].v).trim() : "";
      });
      return obj;
    });

    allRows = rows;

    // ตรวจสอบว่าชื่อคอลัมน์ใน CONFIG ตรงกับหัวคอลัมน์จริงในชีตหรือไม่
    const cols = CONFIG.COLUMNS;
    const requiredCols = [
      cols.teamName, cols.teamCode, cols.status, cols.email,cols.school,cols.note,
      ...CONFIG.MEMBERS.flatMap(m => [m.name, m.year].filter(Boolean))
    ];
    const missingCols = requiredCols.filter(c => !headers.includes(c));
    const diagPanel = document.getElementById('diagPanel');

    if(missingCols.length > 0){
      liveDot.classList.remove('off');
      liveText.textContent = `เชื่อมต่อชีตได้ (${rows.length} แถว) แต่ชื่อคอลัมน์ใน CONFIG ไม่ตรง ${missingCols.length} รายการ`;
      diagPanel.innerHTML = `
        <div class="diag-box">
          <div class="diag-title">⚠️ ชื่อคอลัมน์ใน CONFIG ไม่ตรงกับในชีตจริง</div>
          ระบบเชื่อมต่อชีตสำเร็จและอ่านหัวตารางได้ แต่ชื่อคอลัมน์ต่อไปนี้ที่ตั้งไว้ใน <code>CONFIG</code> หาไม่เจอในชีต:
          <div class="diag-list">${missingCols.map(escapeHtml).join('\n')}</div>
          นี่คือหัวคอลัมน์ทั้งหมดที่ระบบอ่านได้จริงจากชีต (คัดลอกไปวางแทนใน CONFIG ให้ตรงเป๊ะ):
          <div class="diag-list">${headers.map(escapeHtml).join('\n')}</div>
        </div>`;
    }else{
      diagPanel.innerHTML = "";
      liveDot.classList.remove('off');
      liveText.textContent = `เชื่อมต่อแล้ว · ${rows.length} ทีม`;
    }
    lastUpdated.textContent = "อัปเดตล่าสุด " + new Date().toLocaleTimeString('th-TH');

    if(lastQuery) runSearch(lastQuery, true);
  }catch(err){
    liveDot.classList.add('off');
    liveText.textContent = "เชื่อมต่อชีตไม่สำเร็จ — ตรวจสอบ SHEET_ID และสิทธิ์การแชร์";
    console.error(err);
  }
}

function statusClass(statusRaw){
  const s = (statusRaw || "").toLowerCase();
  if(/(approve|อนุมัติ|ผ่าน|confirm|ยืนยัน)/.test(s)) return {cls:"status-approved", label: statusRaw || "อนุมัติแล้ว"};
  if(/(pending|รอ|กำลังตรวจ|review)/.test(s)) return {cls:"status-pending", label: statusRaw || "รอตรวจสอบ"};
  if(/(reject|ปฏิเสธ|ไม่ผ่าน|ยกเลิก)/.test(s)) return {cls:"status-rejected", label: statusRaw || "ไม่ผ่าน"};
  return {cls:"status-unknown", label: statusRaw || "ไม่ระบุ"};
}

function runSearch(query, silent){
  lastQuery = query;
  const q = query.trim().toLowerCase();
  if(!q){
    resultArea.innerHTML = `<div class="state-msg">พิมพ์ชื่อ-นามสกุล หรือชื่อทีมเพื่อค้นหา</div>`;
    return;
  }

  const cols = CONFIG.COLUMNS;

  // แต่ละแถว = 1 ทีม -> ค้นหาจาก "ชื่อทีม" หรือ "ชื่อสมาชิกคนใดก็ได้ในแถวนั้น"
  const matches = allRows.filter(r => {
    const teamNameHit = (r[cols.teamName] || "").toLowerCase().includes(q);
    const memberHit = CONFIG.MEMBERS.some(m => (r[m.name] || "").toLowerCase().includes(q));
    return teamNameHit || memberHit;
  });

  if(matches.length === 0){
    resultArea.innerHTML = `<div class="state-msg">ไม่พบ "${escapeHtml(query)}" ในระบบ<br>ลองตรวจสอบการสะกด หรือค้นหาด้วยชื่อ/นามสกุล/ชื่อทีมเพียงส่วนเดียว</div>`;
    return;
  }

  resultArea.innerHTML = matches.map((row, idx) => {
    const teamName = row[cols.teamName] || "ไม่ระบุชื่อทีม";
    const teamCode = row[cols.teamCode] || "—";
    const email = row[cols.email] || "";
    const school = row[cols.school] || "";  
    const note = row[cols.note] || ""; 
    const st = statusClass(row[cols.status]);

    const activeMembers = CONFIG.MEMBERS
      .map(m => ({
        name: row[m.name],
        year: m.year ? row[m.year] : "",
        role: m.role
      }))
      .filter(m => m.name && m.name.trim() !== "");

    const membersHtml = activeMembers.length
      ? activeMembers.map((m, i) => {
          const isSelf = m.name.toLowerCase().includes(q);
          const detail = [m.role, m.year ? `ชั้นปี ${m.year}` : null].filter(Boolean).join(" · ");
          return `
            <div class="member">
              <span class="member-index">${i + 1}</span>
              <div>
                <div class="member-name${isSelf ? ' self' : ''}">${escapeHtml(m.name)}</div>
                ${detail ? `<div class="member-detail">${escapeHtml(detail)}</div>` : ""}
              </div>
            </div>`;
        }).join("")
      : `<div class="member"><span class="member-name" style="color:var(--text-dim)">ไม่มีข้อมูลสมาชิก</span></div>`;

    return `
      <div class="badge-card" style="animation-delay:${idx * 90}ms">
        <div class="badge-top">
          <div>
            <div class="team-label">ทีม</div>
            <div class="team-name">${escapeHtml(teamName)}</div>
            ${school ? `<div class="team-school">🏫 ${escapeHtml(school)}</div>` : ""} 
            ${email ? `<div class="team-email">✉️ ${escapeHtml(email)}</div>` : ""}
          </div>
          <div class="badge-top-right">
            <div class="team-code">${escapeHtml(teamCode)}</div>
            <span class="status-pill ${st.cls}">${escapeHtml(st.label)}</span>
          </div>
        </div>
        <div class="ticket-divider"></div>
        <div class="members-label">สมาชิกทีม (${activeMembers.length} คน)</div>
        ${membersHtml}
        ${note ? `<div class="team-note">📝 ${escapeHtml(note)}</div>` : ""}  
      </div>`;
  }).join("");
}

function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, m => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[m]));
}

searchBtn.addEventListener('click', () => runSearch(searchInput.value));
searchInput.addEventListener('keydown', e => { if(e.key === 'Enter') runSearch(searchInput.value); });

fetchSheet();
setInterval(fetchSheet, CONFIG.REFRESH_MS);
</script>
</body>
</html>
